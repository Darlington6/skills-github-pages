name: Jekyll build (PR)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and internal link-check site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build with Jekyll (output under baseurl folder)
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build --trace --destination "./_site/skills-github-pages"

      - name: Setup Node (for crawler)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install crawler + local server
        run: npm install -g broken-link-checker http-server

      - name: Serve _site in background
        run: |
          http-server ./_site -p 4000 -a 127.0.0.1 &
          sleep 5

      - name: Smoke test that the baseurl page is reachable
        run: |
          curl -I --fail http://127.0.0.1:4000/skills-github-pages/ >/dev/null

      - name: Crawl local site (internal links only)
        run: |
          blc http://127.0.0.1:4000/skills-github-pages/ \
            --recursive \
            --ordered \
            --filter-level 3 \
            --exclude-external
