name: Jekyll build (PR)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build site with Jekyll
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      - name: Install html-proofer
        run: gem install html-proofer

      - name: Check built site links (HTMLProofer)
        run: |
          htmlproofer ./_site \
            --disable-external \
            --check-html \
            --allow-hash-href
