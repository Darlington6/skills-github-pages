<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Darlington6 Portfolio Site banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="45%" stop-color="#145da0"/>
      <stop offset="100%" stop-color="#1d9bf0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="110" r="220" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="180" cy="560" r="260" fill="#ffffff" fill-opacity="0.06"/>

  <rect x="70" y="70" width="1060" height="490" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.22"/>

  <text x="120" y="220" fill="#f7fbff" font-size="64" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">
    Darlington6 Portfolio Site
  </text>

  <text x="120" y="300" fill="#d9edff" font-size="34" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="400">
    Projects. Resume. Blog. Contact.
  </text>

  <text x="120" y="392" fill="#ffffff" font-size="28" font-family="Menlo, Consolas, monospace" font-weight="500">
    https://darlington6.github.io/skills-github-pages/
  </text>

  <rect x="120" y="435" width="260" height="62" rx="12" fill="#ffffff" fill-opacity="0.18"/>
  <text x="150" y="476" fill="#ffffff" font-size="28" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">
    Live on GitHub Pages
  </text>
</svg>
